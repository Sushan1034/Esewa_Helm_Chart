# ============================================================
# Esewa Testing - Default Values
# ============================================================

# -- Number of pod replicas
replicaCount: 1

# -- Container image configuration
image:
  repository: kjbsdfbuhsdbfu/esewatesting
  tag: "38"
  pullPolicy: Always

# -- Image pull secrets (for private registries)
imagePullSecrets: []

# -- Override chart name
nameOverride: ""
fullnameOverride: ""

# -- Namespace to deploy into
namespace: esewa

# ============================================================
# Environment Variables (non-sensitive → ConfigMap)
# ============================================================
env:
  PORT: "5000"
  ESEWA_PRODUCT_CODE: "EPAYTEST"
  ESEWA_VERIFY_URL: "https://rc-epay.esewa.com.np/api/epay/transaction/status/"

# ============================================================
# Secrets (sensitive → Kubernetes Secret)
# ============================================================
secret:
  MONGO_URI: "mongodb://localhost:27017/esewa_test"
  ESEWA_SECRET_KEY: "8gBm/:&EnhH.1/q"

# ============================================================
# Service
# ============================================================
service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

# ============================================================
# Ingress (Traefik — k3s default)
# ============================================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: esewa.local
  tls: []

# ============================================================
# Resource Requests & Limits
# ============================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ============================================================
# Health Probes
# ============================================================
livenessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ============================================================
# Node / Affinity / Tolerations
# ============================================================
nodeSelector: {}
tolerations: []
affinity: {}
